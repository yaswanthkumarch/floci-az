site_name: Floci-AZ
site_description: Fast, free, open-source local Azure emulator
site_url: https://floci.io/floci-az/
repo_url: https://github.com/floci-io/floci-az
repo_name: floci-io/floci-az
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/floci-header.svg
  favicon: assets/floci.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - assets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Installation: getting-started/installation.md
    - Azure CLI & SDK Setup: getting-started/azure-setup.md
  - Configuration:
    - Docker Compose: configuration/docker-compose.md
    - Ports Reference: configuration/ports.md
    - Storage Modes: configuration/storage.md
    - Advanced:
      - application.yml Reference: configuration/advanced/application-yml.md
  - Services:
    - Overview: services/index.md
    - Blob Storage: services/blob.md
    - Queue Storage: services/queue.md
    - Table Storage: services/table.md
    - Azure Functions: services/functions.md
    - App Configuration: services/app-config.md
    - Key Vault: services/key-vault.md
    - Microsoft Entra ID: services/entra.md
    - Event Hubs: services/event-hub.md
    - Service Bus: services/service-bus.md
    - Cosmos DB: services/cosmos.md
    - Azure SQL Database: services/sql.md
    - Azure Kubernetes Service: services/aks.md
    - API Management: services/apim.md
    - Virtual Network: services/network.md
    - Virtual Machines: services/vm.md
    - Azure Cache for Redis: services/redis.md
    - Azure Container Registry: services/acr.md
    - Event Grid: services/event-grid.md
  - Contributing: contributing.md
  - Changelog: changelog.md
