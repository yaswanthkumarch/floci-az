quarkus:
  log:
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] %s%e%n"
  http:
    port: ${floci-az.port}
    host: 0.0.0.0
    limits:
      max-body-size: 2G
  native:
    additional-build-args: >-
      --initialize-at-run-time=org.apache.hc.client5.http.impl.auth.NTLMEngineImpl,
      --initialize-at-run-time=com.github.dockerjava.transport.NamedPipeSocket$Kernel32,
      --initialize-at-run-time=com.github.dockerjava.core.util.CertificateUtils,
      --initialize-at-run-time=org.bouncycastle.jcajce.provider.drbg.DRBG$Default,
      --initialize-at-run-time=org.bouncycastle.jcajce.provider.drbg.DRBG$NonceAndIV,
      --initialize-at-run-time=org.bouncycastle.crypto.prng.SP800SecureRandom,
      --initialize-at-run-time=org.bouncycastle.jcajce.provider.asymmetric.rsa.KeyPairGeneratorSpi,
      --initialize-at-run-time=org.bouncycastle.jcajce.provider.asymmetric.x509.CertificateFactory,
      --initialize-at-run-time=io.floci.az.core.tls.TlsConfigSource,
      --initialize-at-run-time=io.floci.az.core.tls.CertificateGenerator

floci-az:
  port: 4577
  tls:
    enabled: false    # set to true to enable HTTP+HTTPS on the same port via protocol-sniffing proxy
    self-signed: true  # auto-generate self-signed cert when no cert-path/key-path provided
  base-url: http://localhost:4577
  storage:
    # Global default — applies to every service unless overridden below.
    # Supported modes: memory, persistent, hybrid, wal
    mode: memory
    persistent-path: ./data
    host-persistent-path: ./data
    wal:
      compaction-interval-ms: 30000
    hybrid:
      flush-interval-ms: 5000
    services:
      blob:
        # mode: wal          # uncomment to override for blob only
        flush-interval-ms: 5000
      queue:
        # mode: memory
        flush-interval-ms: 5000
      table:
        # mode: persistent
        flush-interval-ms: 5000
      app-config:
        flush-interval-ms: 5000
      cosmos:
        flush-interval-ms: 5000
      key-vault:
        flush-interval-ms: 5000
      service-bus:
        flush-interval-ms: 5000

  dns:
  # When floci-az runs inside Docker, an embedded DNS server is started on port 53
  # and injected into every Azure Functions container as their resolver. It resolves
  # *.hostname (above) and any extra suffixes to floci-az's Docker network IP.
  # extra-suffixes:
  #   - myapp.internal

  docker:
    docker-host: unix:///var/run/docker.sock
    log-max-size: "10m"
    log-max-file: "3"

  services:
    blob:
      enabled: true
    queue:
      enabled: true
    table:
      enabled: true
    functions:
      enabled: true
      code-path: ${user.home}/.floci-az/functions
      ephemeral: false
      container-idle-timeout-seconds: 300
    app-config:
      enabled: true
    cosmos:
      enabled: true
      engines:
        startup: on-demand
        default-api: nosql
        nosql:
          enabled: false
          # Embedded
        mongodb:
          enabled: false
          # image: mongo:7
        postgresql:
          enabled: false
          # image: citusdata/citus:12
        cassandra:
          enabled: false
          # image: scylladb/scylla:6.2
        gremlin:
          enabled: false
          # image: tinkerpop/gremlin-server
        table:
          enabled: false
          # Embedded
    key-vault:
      enabled: true
    event-hub:
      enabled: true
      mocked: true
      default-namespace: emulatorNs1
      entities: "eh1:4"
      amqp-port: 5672
      amqp-tls-port: 5671
      kafka-enabled: false
      kafka-port: 9093
      artemis-image: "apache/activemq-artemis:latest"
      redpanda-image: "redpandadata/redpanda:latest"
      consumer-groups: "$Default,my-consumer-group"
    sql:
      enabled: true
      # accept-eula: "Y"     # Must be set to "Y" to accept the Microsoft SQL Server EULA
      image: "mcr.microsoft.com/azure-sql-edge:latest"
      sa-password: "FlociAz_Strong123!"
      startup-timeout-seconds: 60
      default-port: 0        # 0 = OS picks a free port per server (recommended)
    service-bus:
      enabled: true
      mocked: true
      amqp-port: 5673
      amqp-tls-port: 5674
      artemis-image: "apache/activemq-artemis:latest"
      max-delivery-count: 10
      lock-duration-seconds: 60
    aks:
      enabled: true
      mocked: false
      default-image: "rancher/k3s:latest"
      api-server-base-port: 6443
      api-server-max-port: 7443
      keep-running-on-shutdown: false
    vm:
      enabled: true
      mocked: true          # true = no Docker; VMs are pure ARM state. false = back VMs with containers (phase 2)
      default-image: "ubuntu:22.04"
    apim:
      enabled: true
    redis:
      enabled: true
      mocked: true          # true = no Docker; caches are pure ARM state. false = back caches with real Redis containers
      default-image: "valkey/valkey:8-alpine"   # RESP-compatible Redis fork (BSD-licensed)
      base-port: 6379
      max-port: 6399
      max-memory: "256mb"
    # docker-network:  # optional: shared Docker network for sidecar containers

  auth:
    # dev: accept any credentials without signature validation
    # strict: validate HMAC-SHA256 signatures
    mode: dev
