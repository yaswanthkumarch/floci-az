name: Release

# Triggered when a version tag (e.g. 1.2.3) is pushed.
# Builds native (amd64 + arm64) Docker images and pushes them to Docker Hub.
#
# Published tags:
#   floci/floci-az:1.2.3   floci/floci-az:latest
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

# Per-tag concurrency. Back-to-back tag pushes (e.g. 1.5.3 and 1.6.0 landing
# minutes apart) resolve to different ${{ github.ref }} values, so they run
# in parallel rather than cancelling each other. Re-runs of the same tag
# supersede in-flight builds of that tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build native artifact — amd64 ────────────────────────────────────────
  build-native-amd64:
    name: Build native artifact (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: ./mvnw clean package -Dnative -DskipTests -B -Dquarkus.native.additional-build-args-append="-march=x86-64-v2"

      - uses: actions/upload-artifact@v7
        with:
          name: native-amd64
          path: |
            target/*-runner
            target/*.properties
            target/*.so
          if-no-files-found: warn
          retention-days: 1

  # ── Build native artifact — arm64 ────────────────────────────────────────
  build-native-arm64:
    name: Build native artifact (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native executable
        run: ./mvnw clean package -Dnative -DskipTests -B

      - uses: actions/upload-artifact@v7
        with:
          name: native-arm64
          path: |
            target/*-runner
            target/*.properties
            target/*.so
          if-no-files-found: warn
          retention-days: 1

  # ── Push native Docker images (multi-arch manifest) ───────────────────────
  push-native:
    name: Push native Docker images
    needs: [build-native-amd64, build-native-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set created timestamp
        id: created
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set SOURCE_DATE_EPOCH
        id: source_date
        run: echo "epoch=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          name: native-amd64
          path: native/amd64/

      - uses: actions/download-artifact@v8
        with:
          name: native-arm64
          path: native/arm64/

      - name: Make binaries executable
        run: chmod +x native/amd64/*-runner native/arm64/*-runner

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push native multi-arch image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        with:
          context: .
          file: docker/Dockerfile.native-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            floci/floci-az:${{ steps.version.outputs.version }}
            floci/floci-az:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.created.outputs.created }}
            version=${{ steps.version.outputs.version }}
            build-date=${{ steps.created.outputs.created }}
            vcs-ref=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max